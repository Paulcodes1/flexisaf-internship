<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="stylesheet" href="./style.css">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Product list with cart</title>
</head>
<body>

  <main class="container">
    <section class="products-section">
      <h1>Desserts</h1>
      <div id="product-list" class="product-grid"></div>
    </section>

    <aside class="cart-section">
      <h2>Your Cart (<span id="cart-count">0</span>)</h2>
      <div id="cart-items">
        <div class="empty-cart">
          <img src="./assets/images/illustration-empty-cart.svg" alt="">
          <p>Your added items will appear here</p>
        </div>
      </div>
      <div id="cart-total-container" class="hidden">
        <div class="total-row">
          <span>Order Total</span>
          <strong id="order-total">$0.00</strong>
        </div>

        <div class="carbon-neutral-badge">
          <img src="./assets/images/icon-carbon-neutral.svg" alt="">
          <p>This is a <strong>carbon-neutral</strong> delivery</p>
        </div>
        <button id="confirm-order" class="confirm-order-btn">Confirm Order</button>
      </div>
    </aside>
  </main>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-content">
      <img src="./assets/images/icon-order-confirmed.svg" alt="Success icon">
      <h1>Order Confirmed</h1>
      <p class="modal-subtitle">We hope you enjoy your food!</p>
    
      <div class="modal-order-summary">
        <div id="modal-item-list" class="modal-item-list">
        </div>

        <div class="modal-total-container">
          <span>Order Total</span>
          <strong id="modal-total-price">$0.00</strong>
        </div>
      </div>

      <button id="new-order-btn" class="new-order-btn">Start New Order</button>
    </div>
  </div>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://x.com/Paul_codes1">Paul Ofili</a>.
  </div>

  <script src="./script.js"></script>
</body>
</html>
