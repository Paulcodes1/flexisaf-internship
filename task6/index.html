<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <title>DOM</title>
</head>
<body>
  <div class="container">
    <h2>DOM Interaction Lab</h2>
    <p id="status-text">Status: <span>Waiting for input...</span></p>

    <div class="interactive-area">
      <input type="text" id="itemInput" placeholder="Type a new skill...">
      <button id="addBtn">Add to List</button>
    </div>

    <ul id="itemList">
    </ul>
        
    <button id="themeBtn">Toggle Dark Mode</button>
  </div>

  <script src="./script.js"></script>
</body>
</html>
