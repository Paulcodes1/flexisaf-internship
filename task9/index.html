<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <title>Drum Machine</title>
</head>
<body>
  <div id="drum-machine">
    <div class="controls">
      <div id="display">POWER OFF</div>
            
      <div class="control-group">
        <span>Power</span>
        <div class="outer-switch" onclick="togglePower()">
          <div class="inner-switch" id="power-handle"></div>
        </div>
      </div>

      <div class="control-group">
        <span>Bank</span>
        <div class="outer-switch" onclick="toggleBank()">
          <div class="inner-switch" id="bank-handle"></div>
        </div>
      </div>

      <div class="volume-container">
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" oninput="adjustVolume(this.value)">
      </div>
    </div>

    <div class="pad-bank">
      <div class="drum-pad" id="pad-q" onclick="triggerPad('Q')">Q
        <audio class="clip" id="Q" src=""></audio>
      </div>
      <div class="drum-pad" id="pad-w" onclick="triggerPad('W')">W
        <audio class="clip" id="W" src=""></audio>
      </div>
      <div class="drum-pad" id="pad-e" onclick="triggerPad('E')">E
        <audio class="clip" id="E" src=""></audio>
      </div>
      <div class="drum-pad" id="pad-a" onclick="triggerPad('A')">A
        <audio class="clip" id="A" src=""></audio>
      </div>
      <div class="drum-pad" id="pad-s" onclick="triggerPad('S')">S
        <audio class="clip" id="S" src=""></audio>
      </div>
      <div class="drum-pad" id="pad-d" onclick="triggerPad('D')">D
        <audio class="clip" id="D" src=""></audio>
      </div>
      <div class="drum-pad" id="pad-z" onclick="triggerPad('Z')">Z
        <audio class="clip" id="Z" src=""></audio>
      </div>
      <div class="drum-pad" id="pad-x" onclick="triggerPad('X')">X
        <audio class="clip" id="X" src=""></audio>
      </div>
      <div class="drum-pad" id="pad-c" onclick="triggerPad('C')">C
        <audio class="clip" id="C" src=""></audio>
      </div>
    </div>
  </div>

<script src="./script.js"></script>
</body>
</html>
